name = "9router-tunnel-registration"
main = "tunnel-register.js"
compatibility_date = "2024-01-01"

# KV Namespace binding
# Run: wrangler kv:namespace create "TUNNEL_KV"
# Then paste the ID below:
[vars]
# Optional: Set a custom public domain for tunnel URLs
# PUBLIC_DOMAIN = "yourdomain.com"

# KV namespace for storing tunnel mappings
# Replace with your actual KV namespace ID
# [kv_namespaces]
# binding = "TUNNEL_KV"
# id = "your-kv-namespace-id"
# preview_id = "your-preview-kv-namespace-id"

# Route configuration (if using stable routing)
# [routes]
# pattern = "tunnel.yourdomain.com/*"
# zone_name = "yourdomain.com"

# Environment-specific configurations
[env.production]
name = "9router-tunnel-registration-production"

[env.staging]
name = "9router-tunnel-registration-staging"